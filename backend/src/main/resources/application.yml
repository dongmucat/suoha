server:
  port: 9091

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

socketio:
  host: 0.0.0.0
  port: 9092

jwt:
  secret: ${JWT_SECRET:suoha-dev-secret-key-must-be-at-least-32-chars}
  expiration: 86400000
